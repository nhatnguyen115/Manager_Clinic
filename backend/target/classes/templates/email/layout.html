<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0A0F1A;
            color: #E2E8F0;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        .wrapper {
            width: 100%;
            table-layout: fixed;
            background-color: #0A0F1A;
            padding-bottom: 40px;
        }

        .main {
            background-color: #111827;
            margin: 0 auto;
            width: 100%;
            max-width: 600px;
            border-spacing: 0;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #1F2937;
        }

        .header {
            background-color: #111827;
            padding: 30px;
            text-align: center;
            border-bottom: 1px solid #1F2937;
        }

        .content {
            padding: 40px 30px;
            line-height: 1.6;
        }

        .footer {
            padding: 30px;
            text-align: center;
            font-size: 12px;
            color: #94A3B8;
            background-color: #0F172A;
        }

        .button {
            display: inline-block;
            padding: 12px 24px;
            background-color: #0F766E;
            color: #FFFFFF !important;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            margin-top: 20px;
        }

        .teal {
            color: #2DD4BF;
        }

        h1 {
            color: #FFFFFF;
            font-size: 24px;
            margin-bottom: 20px;
        }

        p {
            margin-bottom: 15px;
        }

        .divider {
            height: 1px;
            background-color: #1F2937;
            margin: 30px 0;
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <table class="main">
            <tr>
                <td class="header">
                    <h2 style="margin:0; color:#2DD4BF; font-size:28px;">Clinic<span style="color:#FFFFFF;">Pro</span>
                    </h2>
                </td>
            </tr>
            <tr>
                <td class="content">
                    <div th:replace="${content}"></div>
                </td>
            </tr>
            <tr>
                <td class="footer">
                    <p style="margin:0;">&copy; 2026 ClinicPro Management System. All rights reserved.</p>
                    <p style="margin:5px 0 0 0;">123 Medical Plaza, Ho Chi Minh City, Vietnam</p>
                </td>
            </tr>
        </table>
    </div>
</body>

</html>
